# Pipeline CI/CD Android con GitHub Actions
# Este workflow implementa las etapas de lint, pruebas unitarias,
# build del APK firmado con Keystore, y distribución a Firebase App Distribution.

name: Android CI/CD

# Triggers: se ejecuta en push a main/develop y en pull requests a main
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ──────────────────────────────────────────────────────────
  # Job 1: Lint y Pruebas Unitarias
  # Ejecuta análisis de código estático y pruebas unitarias
  # ──────────────────────────────────────────────────────────
  lint-and-test:
    name: Lint y Pruebas Unitarias
    runs-on: ubuntu-latest

    steps:
      # Paso 1: Checkout del código fuente
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      # Paso 2: Configurar JDK 17 (requerido por AGP 8.x)
      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin

      # Paso 3: Cache de dependencias de Gradle para acelerar builds
      - name: Cache de Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      # Paso 4: Dar permisos de ejecución al wrapper de Gradle
      - name: Permisos de ejecución para gradlew
        run: chmod +x gradlew

      # Paso 5: Ejecutar análisis de lint sobre el código
      - name: Lint - Análisis de código estático
        run: ./gradlew lintDebug

      # Paso 6: Ejecutar pruebas unitarias
      - name: Pruebas Unitarias
        run: ./gradlew testDebugUnitTest

      # Paso 7: Verificar cobertura con JaCoCo (quality gate >= 60%)
      - name: Quality Gate - Verificar cobertura de código
        run: ./gradlew jacocoCoverageVerification

      # Paso 8: Subir reportes de pruebas como artefacto
      - name: Subir reportes de pruebas
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: "**/build/reports/tests/**"

      # Paso 9: Subir reporte de cobertura JaCoCo como artefacto
      - name: Subir reporte de cobertura JaCoCo
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-coverage-report
          path: "**/build/reports/jacoco/**"

  # ──────────────────────────────────────────────────────────
  # Job 2: Build y Distribución
  # Genera el APK firmado y lo distribuye vía Firebase
  # Solo se ejecuta en pushes a la rama main (no en PRs)
  # ──────────────────────────────────────────────────────────
  build-and-distribute:
    name: Build y Distribución
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main'

    steps:
      # Paso 1: Checkout del código fuente
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      # Paso 2: Configurar JDK 17
      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin

      # Paso 3: Decodificar el Keystore desde el secret en Base64
      # El Keystore se almacena como secret para no exponerlo en el repositorio
      - name: Decodificar Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > release-key.jks
          echo "KEYSTORE_PATH=$(pwd)/release-key.jks" >> $GITHUB_ENV

      # Paso 4: Dar permisos de ejecución al wrapper de Gradle
      - name: Permisos de ejecución para gradlew
        run: chmod +x gradlew

      # Paso 5: Compilar el APK de release firmado con el Keystore
      - name: Build Release APK
        env:
          KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASS }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASS: ${{ secrets.KEY_PASS }}
        run: ./gradlew assembleRelease

      # Paso 6: Distribuir el APK a Firebase App Distribution
      - name: Distribuir a Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          token: ${{ secrets.FIREBASE_TOKEN }}
          groups: testers
          file: app/build/outputs/apk/release/app-release.apk
          releaseNotes: "Build ${{ github.run_number }} — ${{ github.sha }}"
